<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarnesOS Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080d1a;
      --surface:   #111827;
      --card:      #1a2235;
      --border:    #2a3550;
      --gold:      #c9a84c;
      --gold-dim:  #9a7a35;
      --text:      #e5e7eb;
      --muted:     #6b7280;
      --red:       #ef4444;
      --orange:    #f97316;
      --green:     #22c55e;
      --blue:      #3b82f6;
      --topbar-h:  48px;
      --nav-h:     48px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; }

    /* ─── TOP BAR ─────────────────────────────────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      z-index: 100;
      background: #060b17;
      border-bottom: 1px solid var(--gold-dim);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 4px;
    }
    #topbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--gold);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
      white-space: nowrap;
      padding-right: 16px;
      border-right: 1px solid var(--border);
      margin-right: 8px;
    }
    #topbar-brand span { opacity: 0.6; font-weight: 400; }
    #topbar-metrics {
      display: flex;
      align-items: center;
      flex: 1;
      gap: 4px;
      overflow: hidden;
    }
    .tb-metric {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .tb-metric:hover { background: rgba(201,168,76,0.1); }
    .tb-metric-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .tb-metric-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tb-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 11px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }
    .tb-badge.red  { background: rgba(239,68,68,0.2); color: var(--red); border: 1px solid rgba(239,68,68,0.4); }
    .tb-badge.blue { background: rgba(59,130,246,0.2); color: var(--blue); border: 1px solid rgba(59,130,246,0.4); }
    .tb-badge.gold { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }
    .tb-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
    #topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: 8px; }
    .tb-btn {
      padding: 0 12px;
      height: 30px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    .tb-btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .tb-btn.ghost:hover { color: var(--text); border-color: var(--muted); }

    /* ─── PANEL NAV ───────────────────────────────────────────────────────── */
    #panel-nav {
      position: fixed;
      top: var(--topbar-h);
      left: 0; right: 0;
      height: var(--nav-h);
      z-index: 99;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 4px;
    }
    .nav-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-tab.active { color: var(--gold); background: rgba(201,168,76,0.1); }
    .nav-tab .tab-badge {
      min-width: 18px; height: 18px; padding: 0 4px;
      border-radius: 9px; font-size: 10px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(201,168,76,0.2); color: var(--gold);
    }
    .nav-tab.active .tab-badge { background: var(--gold); color: #000; }
    #nav-refresh {
      margin-left: auto;
      color: var(--muted); font-size: 12px; cursor: pointer;
      padding: 4px 8px; border-radius: 4px; transition: all 0.15s;
    }
    #nav-refresh:hover { color: var(--gold); }
    #refresh-indicator { font-size: 11px; color: var(--muted); margin-left: 4px; }

    /* ─── MAIN CONTENT ────────────────────────────────────────────────────── */
    #main {
      margin-top: calc(var(--topbar-h) + var(--nav-h));
      min-height: calc(100vh - var(--topbar-h) - var(--nav-h));
      padding: 24px 20px;
    }

    /* ─── LOADING / EMPTY ─────────────────────────────────────────────────── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .loading .spin { display: inline-block; animation: spin 1s linear infinite; font-size: 24px; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ─── CARDS ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-value {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ─── HOME PANEL ──────────────────────────────────────────────────────── */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .metric-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
    .metric-card:hover { border-color: var(--gold-dim); transform: translateY(-1px); }
    .metric-card .card-value.red   { color: var(--red); }
    .metric-card .card-value.blue  { color: var(--blue); }
    .metric-card .card-value.gold  { color: var(--gold); }
    .metric-card .card-value.green { color: var(--green); }

    .home-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .count-badge {
      background: rgba(201,168,76,0.15);
      color: var(--gold);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Signal list */
    .signal-list { display: flex; flex-direction: column; gap: 8px; }
    .signal-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .signal-row:hover { border-color: var(--gold-dim); }
    .signal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .signal-dot.hot    { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.5); }
    .signal-dot.warm   { background: var(--orange); }
    .signal-dot.cold   { background: #6b7280; }
    .signal-body { flex: 1; min-width: 0; }
    .signal-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .signal-detail { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .signal-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }

    /* Quick links */
    .quick-links { display: flex; flex-direction: column; gap: 10px; }
    .quick-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .quick-link:hover { border-color: var(--gold-dim); }
    .quick-link-icon { font-size: 20px; }
    .quick-link-info { flex: 1; }
    .quick-link-title { font-weight: 600; font-size: 14px; color: var(--text); }
    .quick-link-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .quick-link-arrow { color: var(--gold-dim); font-size: 16px; }

    /* ─── RADAR PANEL (prospects) ─────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 4px; }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .filter-tab:hover { color: var(--text); }
    .filter-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .filter-tab.all.active { background: var(--card); color: var(--text); border-color: var(--muted); }
    .search-input {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 13px;
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--gold-dim); }
    .search-input::placeholder { color: var(--muted); }
    .ml-auto { margin-left: auto; }

    /* Prospect grid */
    .prospect-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .prospect-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
    }
    .prospect-card:hover { border-color: var(--gold-dim); transform: translateY(-1px); }
    .prospect-card.hot  { border-left: 3px solid var(--red); }
    .prospect-card.warm { border-left: 3px solid var(--orange); }
    .prospect-card.cold { border-left: 3px solid var(--muted); }
    .prospect-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .prospect-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
    .prospect-company { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .tier-pill {
      padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
    }
    .tier-pill.hot  { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .tier-pill.warm { background: rgba(249,115,22,0.15); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
    .tier-pill.cold { background: rgba(107,114,128,0.15); color: var(--muted); border: 1px solid rgba(107,114,128,0.3); }
    .prospect-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .prospect-score {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 11px; font-weight: 700;
      position: absolute; top: 14px; right: 14px;
    }
    .score-high { background: rgba(239,68,68,0.2); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .score-med  { background: rgba(249,115,22,0.2); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
    .score-low  { background: rgba(107,114,128,0.2); color: var(--muted); border: 1px solid rgba(107,114,128,0.2); }
    .prospect-signals { display: flex; flex-direction: column; gap: 4px; }
    .signal-chip {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(59,130,246,0.1);
      color: #93c5fd;
      border: 1px solid rgba(59,130,246,0.2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .no-signals { font-size: 11px; color: var(--muted); font-style: italic; }
    .prospect-footer { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .prospect-yacht { font-size: 11px; color: var(--gold-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Prospect detail modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%; max-width: 640px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .modal-close { font-size: 20px; cursor: pointer; color: var(--muted); padding: 4px; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .detail-field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
    .detail-field .val { font-size: 13px; color: var(--text); font-weight: 500; }
    .signal-timeline { display: flex; flex-direction: column; gap: 8px; }
    .signal-timeline-item {
      padding: 10px 12px; background: var(--surface); border-radius: 6px; border-left: 2px solid var(--blue);
    }
    .signal-timeline-item .st-title { font-size: 13px; font-weight: 600; }
    .signal-timeline-item .st-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ─── MATCHMAKER PANEL (outreach chains) ──────────────────────────────── */
    .chain-list { display: flex; flex-direction: column; gap: 12px; }
    .chain-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      transition: border-color 0.15s;
    }
    .chain-card:hover { border-color: var(--border); }
    .chain-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .chain-name { font-weight: 600; font-size: 14px; flex: 1; }
    .chain-company { font-size: 12px; color: var(--muted); }
    .chain-steps { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .step-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 14px; font-size: 11px; font-weight: 600;
      border: 1px solid; cursor: pointer; transition: all 0.15s;
    }
    .step-pill.pending  { background: rgba(107,114,128,0.1); color: var(--muted);   border-color: rgba(107,114,128,0.3); }
    .step-pill.sent     { background: rgba(59,130,246,0.1);  color: var(--blue);    border-color: rgba(59,130,246,0.3); }
    .step-pill.replied  { background: rgba(34,197,94,0.1);   color: var(--green);   border-color: rgba(34,197,94,0.3); }
    .step-pill.bounced  { background: rgba(239,68,68,0.1);   color: var(--red);     border-color: rgba(239,68,68,0.3); }
    .step-pill.skipped  { background: rgba(107,114,128,0.05); color: #374151; border-color: rgba(107,114,128,0.2); }
    .step-icon { font-size: 12px; }
    .chain-footer { margin-top: 10px; display: flex; align-items: center; gap: 8px; }
    .chain-date { font-size: 11px; color: var(--muted); }
    .action-btn {
      padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      color: var(--muted); transition: all 0.15s;
    }
    .action-btn:hover { color: var(--text); border-color: var(--muted); }
    .action-btn.danger:hover { color: var(--red); border-color: var(--red); }
    .action-btn.gold  { color: var(--gold); border-color: var(--gold-dim); background: rgba(201,168,76,0.1); }
    .step-status-menu {
      position: absolute; z-index: 150;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px;
      display: flex; flex-direction: column; gap: 2px;
      min-width: 120px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .step-status-option {
      padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
      transition: background 0.1s; color: var(--text);
    }
    .step-status-option:hover { background: rgba(255,255,255,0.08); }

    /* New chain modal */
    .modal-form { display: flex; flex-direction: column; gap: 14px; }
    .form-field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 500; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 8px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold-dim); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-select option { background: var(--surface); }
    .btn {
      padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.15s; font-family: inherit;
    }
    .btn-primary { background: var(--gold); color: #000; }
    .btn-primary:hover { background: #d4b45a; }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
    .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

    /* ─── PANEL 1: MATCH SUMMARY WIDGET ──────────────────────────────────── */
    .panel1-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .panel1-title {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold);
      display: flex; align-items: center; gap: 8px;
    }
    .panel1-view-all {
      font-size: 12px; color: var(--gold); text-decoration: none; opacity: 0.8;
      padding: 4px 10px; border-radius: 4px; border: 1px solid var(--gold-dim);
      transition: all 0.15s;
    }
    .panel1-view-all:hover { opacity: 1; background: var(--gold-dim); }
    .match-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .match-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      transition: border-color 0.15s;
    }
    .match-row:hover { border-color: rgba(201,168,76,0.3); }
    .match-score-badge {
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; border-radius: 8px; flex-shrink: 0;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
      background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.25);
    }
    .match-score-badge.high { background: rgba(34,197,94,0.12); color: var(--green); border-color: rgba(34,197,94,0.25); }
    .match-score-badge.med  { background: rgba(201,168,76,0.12); color: var(--gold);  border-color: rgba(201,168,76,0.25); }
    .match-score-badge.low  { background: rgba(107,114,128,0.12); color: var(--muted); border-color: rgba(107,114,128,0.2); }
    .match-body { flex: 1; min-width: 0; }

<script>
'use strict';

// ═══ STATE ══════════════════════════════════════════════════════════════════
let _stats = null;
let _lastSignalProspectId = null;
let _activeFilter = { radar: 'all', matchmaker: 'all' };
let _radarSearch = '';
let _prospects = [];
let _chains = [];
let _fundEntries = [];
let _fundDeals = [];
let _yachtsForFund = [];
let _signals = [];
let _refreshInterval = null;
let _stepMenuTarget = null;

const FUND_TARGET = 30_000_000;
const FUND_STAGES = [
  { key: 'contacted',   label: 'Contacted',   short: 'CONT' },
  { key: 'deck_sent',   label: 'Deck Sent',   short: 'DECK' },
  { key: 'meeting',     label: 'Meeting',     short: 'MTG'  },
  { key: 'soft_commit', label: 'Soft Commit', short: 'SOFT' },
  { key: 'hard_commit', label: 'Hard Commit', short: 'HARD' },
  { key: 'wired',       label: 'Wired',       short: 'WIRE' }
];

// ═══ ROUTER ═════════════════════════════════════════════════════════════════
function getPath() {
  return window.location.pathname;
}

function navigate(path, pushState = true) {
  if (pushState) history.pushState({}, '', path);
  updateNavTabs();
  renderPanel(path);
}

function updateNavTabs() {
  const path = getPath();
  document.querySelectorAll('.nav-tab').forEach(tab => {
    const tabPath = tab.dataset.path;
    tab.classList.toggle('active', path === tabPath || (tabPath !== '/cockpit' && path.startsWith(tabPath)));
  });
}

window.addEventListener('popstate', () => {
  updateNavTabs();
  renderPanel(getPath());
});

// ═══ TOP BAR ════════════════════════════════════════════════════════════════
async function loadStats() {
  try {
    const r = await fetch('/api/cockpit/stats');
    const data = await r.json();
    if (!data.success) return;
    _stats = data;
    renderTopBar(data);
  } catch(e) { console.warn('Stats error:', e); }
}

function renderTopBar(d) {
  // Hot prospects
  const hotEl = document.getElementById('tb-hot-count');
  hotEl.textContent = d.hot_prospects;
  document.getElementById('nav-hot-badge').textContent = d.hot_prospects;

  // Active chains
  const chainEl = document.getElementById('tb-chains-count');
  chainEl.textContent = d.active_chains;
  document.getElementById('nav-chain-badge').textContent = d.active_chains;

  // Fund
  document.getElementById('tb-fund-pct').textContent = d.fund.percentage + '%';
  document.getElementById('tb-fund-val').textContent = d.fund.formatted;

  // Last signal
  if (d.last_signal) {
    _lastSignalProspectId = d.last_signal.prospect_id;
    const elapsed = timeAgo(d.last_signal.detected_at);
    const type = formatSignalType(d.last_signal.signal_type);
    document.getElementById('tb-signal-val').textContent =
      `${d.last_signal.prospect_name} · ${type} · ${elapsed}`;
  } else {
    document.getElementById('tb-signal-val').textContent = 'No signals yet';
  }
}

function handleSignalClick() {
  if (_lastSignalProspectId) {
    navigate('/cockpit/radar');
    setTimeout(() => openProspectModal(_lastSignalProspectId), 200);
  } else {
    navigate('/cockpit/radar');
  }
}

// ═══ PANEL RENDERER ═════════════════════════════════════════════════════════
function renderPanel(path) {
  const main = document.getElementById('main');
  const params = new URLSearchParams(window.location.search);

  // When navigating away from radar, reset globe ready flag so it re-inits next visit
  if (!path.startsWith('/cockpit/radar') && window._globeReady) {
    window._globeReady = false;
  }

  if (path === '/cockpit' || path === '/cockpit/') {
    renderHome(main);
  } else if (path.startsWith('/cockpit/radar')) {
    const tierFilter = params.get('tier') || _activeFilter.radar;
    _activeFilter.radar = tierFilter;
    renderRadar(main, tierFilter);
  } else if (path.startsWith('/cockpit/matchmaker')) {
    const statusFilter = params.get('status') || _activeFilter.matchmaker;
    _activeFilter.matchmaker = statusFilter;
    renderMatchmaker(main, statusFilter);
  } else if (path.startsWith('/cockpit/fund')) {
    renderFund(main);
  } else {
    renderHome(main);
  }
}

async function refreshAll() {
  const ind = document.getElementById('refresh-indicator');
  ind.textContent = 'refreshing…';
  await Promise.all([loadStats(), reloadCurrentPanel()]);
  ind.textContent = 'auto-refresh 30s';
}

async function reloadCurrentPanel() {
  const path = getPath();
  if (path.startsWith('/cockpit/radar')) {
    await loadProspects();
    await loadSignals();
  } else if (path.startsWith('/cockpit/matchmaker')) {
    await loadChains();
  } else if (path.startsWith('/cockpit/fund')) {
    await loadFundEntries();
  } else {
    await Promise.all([loadSignals(), loadProspects()]);
  }
  renderPanel(path);
}

async function renderRadar(container, tierFilter = 'all') {
  const globeExists = !!document.getElementById('globe-radar-section');

  if (!globeExists) {
    // First visit: show loading, then build full UI including globe
    container.innerHTML = '<div class="loading"><div class="spin">⏳</div></div>';
    await loadProspects();
    container.innerHTML = GLOBE_SECTION_HTML + buildFilterBarHTML(tierFilter);
    renderProspectGrid();
    // Init globe after DOM is ready
    if (!window._globeReady) initGlobe();
  } else {
    // Re-render on auto-refresh: globe exists, just refresh data
    await loadProspects();
    // Update filter tab counts
    const allBtn = container.querySelector('.filter-tab.all');
    if (allBtn) allBtn.textContent = 'All (' + _prospects.length + ')';
    const hotBtn = container.querySelector('.filter-tab[data-tier="hot"]');
    if (hotBtn) hotBtn.innerHTML = '🔴 Hot (' + _prospects.filter(p=>p.heat_tier==='hot').length + ')';
    const warmBtn = container.querySelector('.filter-tab[data-tier="warm"]');

    if (coldBtn) coldBtn.innerHTML = '🟡 Cold (' + _prospects.filter(p=>p.heat_tier==='cold').length + ')';

function setRadarFilter(tier) {
  _activeFilter.radar = tier;
  history.replaceState({}, '', tier === 'all' ? '/cockpit/radar' : '/cockpit/radar?tier=' + tier);
  // Update filter tab active states without re-rendering the globe
  document.querySelectorAll('.filter-tab').forEach(btn => {
    const btnTier = btn.dataset.tier;
    btn.classList.toggle('active', btnTier === tier || (tier === 'all' && btn.classList.contains('all')));
  });
  renderProspectGrid();
}

function renderProspectGrid() {
  const grid = document.getElementById('prospect-grid');
  if (!grid) return;
  let list = _prospects;
  if (_activeFilter.radar !== 'all') list = list.filter(p => p.heat_tier === _activeFilter.radar);
  if (_radarSearch) {
    const q = _radarSearch.toLowerCase();
    list = list.filter(p =>
      (p.name||'').toLowerCase().includes(q) ||
      (p.company||'').toLowerCase().includes(q) ||
      (p.location||'').toLowerCase().includes(q)
    );
  }

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>No prospects match this filter.</p></div>';
    return;

  grid.innerHTML = list.map(p => {
    const signals = p.top_signals || [];
    const scoreClass = p.heat_score >= 20 ? 'score-high' : p.heat_score >= 8 ? 'score-med' : 'score-low';

    return `
      <div class="prospect-card ${p.heat_tier}" onclick="openProspectModal(${p.id})">

        <div class="prospect-header">

  try {
    const r = await fetch('/api/prospects/' + id);

    if (!data.success) return;
    const p = data.prospect;
    const signals = data.signals || [];

    document.getElementById('pm-name').textContent = p.name;
    document.getElementById('pm-company').textContent = p.company || '—';
    document.getElementById('pm-location').textContent = p.location || '—';
    document.getElementById('pm-tier').innerHTML = `<span class="tier-pill ${p.heat_tier}">${p.heat_tier.toUpperCase()}</span>`;
    document.getElementById('pm-yacht').textContent = [p.yacht_brand, p.yacht_model].filter(Boolean).join(' ') || p.current_yacht_interest || '—';
    document.getElementById('pm-score').textContent = p.heat_score || 0;
    document.getElementById('pm-email').textContent = p.email || '—';
    document.getElementById('pm-scanned').textContent = p.last_scanned_at ? timeAgo(p.last_scanned_at) : 'Never';

    if (signals.length === 0) {
      sigsEl.innerHTML = '<div class="empty" style="padding:20px 0"><p>No signals detected yet.</p></div>';
    } else {
      sigsEl.innerHTML = `<div class="signal-timeline">${signals.slice(0,20).map(s => `
        <div class="signal-timeline-item">
          <div class="st-title">${esc(s.title || formatSignalType(s.signal_type))}</div>

let _matchSummary = [];
let _activatedMatches = new Set(); // track which pairs have been activated this session

async function loadMatchSummary() {
  try {
    const r = await fetch('/api/cockpit/match-summary');
    const data = await r.json();
    if (data.success) _matchSummary = data.matches || [];
  } catch(e) {
    console.warn('Match summary error:', e);
    _matchSummary = [];
  }
}

async function renderMatchmaker(container, statusFilter = 'all') {
  container.innerHTML = '<div class="loading"><div class="spin">⏳</div></div>';

  // Load match summary and chains in parallel
  await Promise.all([loadMatchSummary(), loadChains()]);

  let filtered = _chains;
  if (statusFilter === 'active') {
    filtered = _chains.filter(c => parseInt(c.sent_count) > 0 && parseInt(c.replied_count) === 0 && parseInt(c.pending_count) > 0);
  } else if (statusFilter === 'replied') {
    filtered = _chains.filter(c => parseInt(c.replied_count) > 0);
  } else if (statusFilter === 'pending') {
    filtered = _chains.filter(c => parseInt(c.sent_count) === 0);
  }

  const counts = {
    all: _chains.length,
    active: _chains.filter(c => parseInt(c.sent_count) > 0 && parseInt(c.replied_count) === 0 && parseInt(c.pending_count) > 0).length,
    replied: _chains.filter(c => parseInt(c.replied_count) > 0).length,
    pending: _chains.filter(c => parseInt(c.sent_count) === 0).length
  };

  // Build match summary widget HTML
  const matchWidgetHtml = buildMatchSummaryHtml();

  container.innerHTML = `
    ${matchWidgetHtml}

    <div class="panel1-header" style="margin-top:8px">
      <div class="panel1-title" style="color:var(--text-secondary,#94a3b8);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;">
        ✉️ Outreach Chains
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="filter-tabs" style="display:flex;gap:4px">
          ${['all','active','replied','pending'].map(s => `
            <button class="filter-tab ${s === 'all' ? 'all' : ''} ${statusFilter === s ? 'active' : ''}"
              onclick="setMatchmakerFilter('${s}')" style="padding:4px 10px;font-size:11px">
              ${s.charAt(0).toUpperCase()+s.slice(1)} (${counts[s]})
            </button>`).join('')}
        </div>
        <button class="btn btn-primary" onclick="openChainModal()" style="font-size:11px;padding:5px 12px;">+ New Chain</button>
      </div>
    </div>
    <div id="chain-list" class="chain-list"></div>
  `;

  renderChainList(filtered);
}

          </div>

        </div>
        ${isDone
          ? `<button class="match-activate-btn done" disabled>Draft Created ✓</button>`

        }

    }).join('');

  `;
}

async function activateMatch(prospectId, yachtId, score, reason, btn) {
  btn.disabled = true;
  btn.textContent = 'Creating…';
  try {
    const r = await fetch('/api/cockpit/activate-match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prospect_id: prospectId, yacht_id: yachtId, match_score: score, match_reason: reason })
    });
    const data = await r.json();
    if (data.success) {
      _activatedMatches.add(`${prospectId}:${yachtId}`);
      btn.textContent = 'Draft Created ✓';
      btn.className = 'match-activate-btn done';
      // Refresh chains in background
      loadChains().then(() => {
        renderChainList(_chains.filter(c => {
          const f = _activeFilter.matchmaker;
          if (f === 'active') return parseInt(c.sent_count) > 0 && parseInt(c.replied_count) === 0 && parseInt(c.pending_count) > 0;
          if (f === 'replied') return parseInt(c.replied_count) > 0;
          if (f === 'pending') return parseInt(c.sent_count) === 0;
          return true;
        }));
        loadStats().then(d => { if (_stats) renderTopBar(_stats); });
      });
    } else {
      btn.textContent = 'Activate';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'Activate';
    btn.disabled = false;
    console.error('Activate match error:', e);
  }
}

function setMatchmakerFilter(status) {
  _activeFilter.matchmaker = status;
  history.replaceState({}, '', status === 'all' ? '/cockpit/matchmaker' : '/cockpit/matchmaker?status=' + status);
  renderMatchmaker(document.getElementById('main'), status);
}

function renderChainList(chains) {
  const el = document.getElementById('chain-list');
  if (!el) return;
  if (chains.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>
      <p>No chains here.</p>
      <button class="btn btn-primary" onclick="openChainModal()" style="margin-top:12px">+ New Outreach Chain</button>
    </div>`;
    return;
  }

  el.innerHTML = chains.map(c => {
    const steps = c.steps || [];
    const stepPills = steps.map(s => {
      const icons = { pending:'○', sent:'→', replied:'✓', bounced:'✗', skipped:'⊘' };
      const label = s.channel === 'linkedin' ? 'LI' : s.channel === 'phone' ? '☎' : 'Email';
      return `<span class="step-pill ${s.status}" onclick="openStepMenu(event,${c.id},${s.id},'${s.status}')" title="Step ${s.step_number}: ${esc(s.subject || s.channel)} — click to change status">
        <span class="step-icon">${icons[s.status] || '○'}</span>
        ${label} D${s.scheduled_for ? '' : s.step_number * 3 - 3}
      </span>`;
    }).join('');

    const chainStatus = parseInt(c.replied_count) > 0 ? 'replied'
      : parseInt(c.sent_count) > 0 && parseInt(c.pending_count) > 0 ? 'active'
      : parseInt(c.sent_count) > 0 ? 'completed' : 'pending';

    const statusColors = { replied: 'var(--green)', active: 'var(--blue)', pending: 'var(--muted)', completed: 'var(--gold)' };

    return `
      <div class="chain-card" id="chain-${c.id}">
        <div class="chain-header">
          <div>
            <div class="chain-name">${esc(c.prospect_name)}</div>
            <div class="chain-company">${esc(c.prospect_company || '')} · <span class="tier-pill ${c.heat_tier}" style="font-size:9px;padding:2px 6px">${c.heat_tier.toUpperCase()}</span></div>
          </div>
          <span style="font-size:11px;font-weight:600;color:${statusColors[chainStatus]}">${chainStatus.toUpperCase()}</span>
        </div>
        <div class="chain-steps">${stepPills || '<span style="font-size:12px;color:var(--muted)">No steps yet</span>'}</div>
        ${c.title ? `<div style="font-size:11px;color:var(--muted);margin-top:8px;font-style:italic">"${esc(c.title)}"</div>` : ''}
        <div class="chain-footer">
          <span class="chain-date">Created ${timeAgo(c.created_at)}</span>
          <button class="action-btn" onclick="addStepToChain(${c.id})">+ Step</button>
          <button class="action-btn danger" onclick="deleteChain(${c.id})">Delete</button>
        </div>
      </div>`;
  }).join('');
}

// Step status popover
let _stepMenuChainId = null, _stepMenuStepId = null;
function openStepMenu(e, chainId, stepId, currentStatus) {
  e.stopPropagation();
  _stepMenuChainId = chainId;
  _stepMenuStepId = stepId;
  const menu = document.getElementById('step-menu');
  const statuses = ['pending','sent','replied','bounced','skipped'];
  menu.innerHTML = statuses.map(s =>
    `<div class="step-status-option ${s === currentStatus ? 'active' : ''}" onclick="setStepStatus('${s}')" style="${s === currentStatus ? 'color:var(--gold)' : ''}">
      ${s === currentStatus ? '✓ ' : ''}${s.charAt(0).toUpperCase()+s.slice(1)}
    </div>`
  ).join('');
  const rect = e.currentTarget.getBoundingClientRect();
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.left = rect.left + 'px';
  menu.style.display = 'flex';
  setTimeout(() => document.addEventListener('click', closeStepMenu, { once: true }), 10);
}

function closeStepMenu() {
  document.getElementById('step-menu').style.display = 'none';
}

async function setStepStatus(status) {
  closeStepMenu();
  if (!_stepMenuChainId || !_stepMenuStepId) return;
  try {
    await fetch(`/api/outreach/chains/${_stepMenuChainId}/steps/${_stepMenuStepId}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status })
    });
    await loadChains();
    renderMatchmaker(document.getElementById('main'), _activeFilter.matchmaker);
    await loadStats();
    if (_stats) renderTopBar(_stats);
  } catch(e) { console.error(e); }
}

async function deleteChain(id) {
  if (!confirm('Delete this outreach chain?')) return;
  await fetch('/api/outreach/chains/' + id, { method: 'DELETE' });
  await loadChains();
  renderMatchmaker(document.getElementById('main'), _activeFilter.matchmaker);
}

async function addStepToChain(chainId) {
  const channel = prompt('Channel (email/linkedin/phone):', 'email') || 'email';
  const subject = prompt('Subject/title:', '') || '';
  const stepNum = (_chains.find(c => c.id === chainId)?.steps?.length || 0) + 1;
  await fetch(`/api/outreach/chains/${chainId}/steps`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ step_number: stepNum, channel, subject })
  }).catch(() => {
    // Fallback: create chain with steps via PATCH workaround using steps endpoint
    return fetch(`/api/outreach/chains`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prospect_id: _chains.find(c=>c.id===chainId)?.prospect_id, steps:[{step_number:stepNum,channel,subject}] })
    });
  });
  // Use the existing POST /api/outreach/chains with a steps override
  // Actually, let's just refresh and handle that the step-add button opens the chain modal pre-filled
  await loadChains();
  renderMatchmaker(document.getElementById('main'), _activeFilter.matchmaker);
}

let _chainStepCount = 0;
async function openChainModal() {
  _chainStepCount = 0;
  const select = document.getElementById('cf-prospect');
  if (_prospects.length === 0) await loadProspects();
  select.innerHTML = _prospects.map(p =>

  ).join('');
  document.getElementById('cf-title').value = '';
  document.getElementById('cf-notes').value = '';

function closeChainModal(e) {
  if (!e || e.target === document.getElementById('chain-modal')) {
    document.getElementById('chain-modal').classList.add('hidden');
  }
}

function addChainStep() {
  _chainStepCount++;
  const n = _chainStepCount;
  const stepsEl = document.getElementById('cf-steps');
  const div = document.createElement('div');
  div.id = `cf-step-${n}`;
  div.style.cssText = 'display:grid;grid-template-columns:60px 1fr 1fr;gap:8px;margin-bottom:8px;align-items:end';
  div.innerHTML = `
    <div class="form-field"><label>Step ${n}</label>
      <select class="form-select" id="cf-s${n}-channel">
        <option value="email">Email</option>
        <option value="linkedin">LinkedIn</option>
        <option value="phone">Phone</option>
      </select>
    </div>
    <div class="form-field"><label>Subject</label><input class="form-input" id="cf-s${n}-subject" placeholder="Subject…"/></div>
    <div class="form-field"><label>Date</label><input class="form-input" id="cf-s${n}-date" type="date"/></div>
  `;

async function submitChain() {
  const prospectId = document.getElementById('cf-prospect').value;
  const title = document.getElementById('cf-title').value.trim();
  const notes = document.getElementById('cf-notes').value.trim();
  const steps = [];
  for (let i = 1; i <= _chainStepCount; i++) {
    const channel = document.getElementById(`cf-s${i}-channel`)?.value || 'email';
    const subject = document.getElementById(`cf-s${i}-subject`)?.value || '';
    const date = document.getElementById(`cf-s${i}-date`)?.value || null;
    steps.push({ step_number: i, channel, subject, scheduled_for: date || null });
  }
  try {
    const r = await fetch('/api/outreach/chains', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prospect_id: prospectId, title: title || null, notes: notes || null, steps })
    });
    const data = await r.json();
    if (!data.success) { alert('Error: ' + data.message); return; }
    closeChainModal();
    await loadChains();
    renderMatchmaker(document.getElementById('main'), _activeFilter.matchmaker);
    await loadStats();
    if (_stats) renderTopBar(_stats);
  } catch(e) { console.error(e); alert('Failed to create chain'); }
}

// ── Investor stage helpers
function fundStageLabel(s) {
  const m = { contacted:'Contacted', deck_sent:'Deck Sent', meeting:'Meeting',
    soft_commit:'Soft Commit', hard_commit:'Hard Commit', wired:'Wired', withdrawn:'Withdrawn' };
  return m[s] || s || '—';
}
function fundStageIdx(s) { return FUND_STAGES.findIndex(x => x.key === s); }

// ── Render investor pipeline table
function renderInvestorsList() {
  const el = document.getElementById('investors-list');
  if (!el) return;
  const filter = document.getElementById('inv-filter-sel')?.value || 'all';
  const entries = filter === 'all' ? _fundEntries
    : _fundEntries.filter(e => (e.stage || e.status) === filter);

  if (entries.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:32px;color:var(--muted)">${_fundEntries.length === 0 ? 'No investors yet. Add your first investor.' : 'No investors at this stage.'}</div>`;
    return;
  }

  el.innerHTML = entries.map(e => {
    const stage = e.stage || e.status || 'contacted';
    const idx = fundStageIdx(stage);
    const isConfirmed = ['hard_commit','wired'].includes(stage);
    const amtColor = stage === 'wired' ? 'var(--green)' : stage === 'hard_commit' ? 'var(--gold)' : 'var(--text)';

    const dots = FUND_STAGES.map((s, i) => {
      let cls = 'sdot';
      if (i < idx) cls += ' filled';
      else if (i === idx) cls += s.key === 'wired' ? ' wired-dot' : ' current';
      const isAdvanceable = i === idx && idx < FUND_STAGES.length - 1;
      return `<div class="sdot-btn" ${isAdvanceable ? `onclick="advanceInvestorStage(${e.id}, event)"` : ''} title="${s.label}${isAdvanceable ? ' (click to advance)' : ''}">
        <div class="${cls}"></div>
        <div class="sdot-label">${s.short}</div>
      </div>`;
    }).join('');

    return `<div class="investor-pipeline-row">
      <div>
        <div class="inv-name">${esc(e.investor_name)}</div>
        ${e.email ? `<div class="inv-email">${esc(e.email)}</div>` : ''}
      </div>
      <div class="inv-amount" style="color:${amtColor}">€${(parseFloat(e.amount_eur)/1e3).toFixed(0)}k</div>
      <div class="stage-dots-row">${dots}</div>
      <div style="font-size:11px;color:var(--muted)">${timeAgo(e.updated_at)}</div>
      <div class="row-actions">
        <button class="action-btn danger" onclick="deleteEntry(${e.id})" title="Remove">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── Advance investor to next stage (single click + confirm)
async function advanceInvestorStage(id, event) {
  event?.stopPropagation();
  const e = _fundEntries.find(x => x.id === id);
  if (!e) return;
  const stage = e.stage || e.status || 'contacted';
  const idx = fundStageIdx(stage);
  if (idx >= FUND_STAGES.length - 1) { alert('Already at final stage: Wired'); return; }
  const next = FUND_STAGES[idx + 1];
  if (!confirm(`Advance "${e.investor_name}"\n${fundStageLabel(stage)} → ${next.label}?`)) return;

  const r = await fetch(`/api/fund/entries/${id}/advance-stage`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}
  });
  const data = await r.json();
  if (!data.success) { alert('Error: ' + data.message); return; }
  const i = _fundEntries.findIndex(x => x.id === id);
  if (i >= 0) _fundEntries[i] = data.entry;
  renderFund(document.getElementById('main'));
  await loadStats();
  if (_stats) renderTopBar(_stats);
}

function calcDealMath() {
  const acq = parseFloat(document.getElementById('deal-acq')?.value) || 0;
  const asset = parseFloat(document.getElementById('deal-asset')?.value) || 0;
  const tradein = parseFloat(document.getElementById('deal-tradein')?.value) || 0;
  const preview = document.getElementById('deal-math-preview');
  if (!preview) return;
  if (acq > 0 || asset > 0) {
    const spread = asset - acq;
    const margin = acq > 0 ? (spread / acq * 100).toFixed(1) : '—';
    const pct = tradein > 0 ? (acq / tradein * 100).toFixed(1) : '—';
    preview.style.display = 'flex';
    preview.innerHTML = `
      <div class="dmp-item">Acq Rate: <strong>${pct !== '—' ? pct + '%' : '—'}</strong></div>
      <div class="dmp-item">Est. Spread: <strong style="color:${spread>0?'var(--green)':'var(--red)'}">€${(spread/1e3).toFixed(0)}k</strong></div>
      <div class="dmp-item">Gross Margin: <strong style="color:${spread>0?'var(--green)':'var(--red)'}">${margin !== '—' ? margin + '%' : '—'}</strong></div>
      <div class="dmp-item">12% Yield: <strong>€${(acq * 0.12 / 1e3).toFixed(0)}k/yr</strong></div>
    `;
  } else {
    preview.style.display = 'none';
  }
}

// ═══ UTILS ══════════════════════════════════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(dateStr) {
  if (!dateStr) return '—';
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60)   return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return new Date(dateStr).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function formatSignalType(t) {
  if (!t) return 'Signal';
  return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
}

function statusLabel(s) {
  const labels = {
    contacted: 'Contacted', deck_sent: 'Deck Sent', meeting: 'Meeting',
    soft_commit: 'Soft Commit', hard_commit: 'Hard Commit', wired: 'Wired', withdrawn: 'Withdrawn'
  };
  return labels[s] || s;
}

  'japan': [36.2048, 138.2529], 'india': [20.5937, 78.9629],
  'australia': [-25.2744, 133.7751], 'brazil': [-14.2350, -51.9253],
  'canada': [56.1304, -106.3468], 'mexico': [23.6345, -102.5528],
  'switzerland': [46.8182, 8.2275], 'austria': [47.5162, 14.5501],
  'sweden': [60.1282, 18.6435], 'norway': [60.4720, 8.4689],
  'denmark': [56.2639, 9.5018], 'greece': [39.0742, 21.8243],
  'portugal': [39.3999, -8.2245], 'netherlands': [52.1326, 5.2913],
  'belgium': [50.5039, 4.4699], 'poland': [51.9194, 19.1451],
  'turkey': [38.9637, 35.2433], 'uae': [23.4241, 53.8478],
  'saudi arabia': [23.8859, 45.0792], 'qatar': [25.3548, 51.1839],
  'south korea': [35.9078, 127.7669], 'ireland': [53.1424, -7.6921], 'cyprus': [35.1264, 33.4299],
};

function geocodeLocation(loc) {
  if (!loc) return null;
  const key = loc.toLowerCase().trim();
  if (CITY_COORDS[key]) { const [lat, lng] = CITY_COORDS[key]; return { lat, lng }; }
  const parts = key.split(',').map(p => p.trim());
  for (const part of parts) {
    if (CITY_COORDS[part]) { const [lat, lng] = CITY_COORDS[part]; return { lat, lng }; }
  }
  for (const [k, v] of Object.entries(CITY_COORDS)) {
    if (k.startsWith(parts[0])) { const [lat, lng] = v; return { lat, lng }; }
  }
  return null;
}

function mapProspectsForGlobe(prospects, tier) {
  return prospects.map(p => {
    const coords = geocodeLocation(p.location);
    return { name: p.name || 'Unknown', company: p.company || '', loc: p.location || '', score: p.heat_score ?? 0, lat: coords ? coords.lat : 0, lng: coords ? coords.lng : 0, _hasCoords: !!coords };
  }).filter(p => p._hasCoords);
}

function groupProspectsByTier(flatList) {
  return {
    hot:  flatList.filter(p => p.heat_tier === 'hot'),
    warm: flatList.filter(p => p.heat_tier === 'warm'),
    cold: flatList.filter(p => p.heat_tier === 'cold'),
  };
}

async function initGlobe() {
  window._globeReady = true;

  const canvas = document.getElementById('globe-canvas');
  if (!canvas || typeof THREE === 'undefined' || typeof topojson === 'undefined') {
    console.warn('Globe: canvas or libraries not ready');
    window._globeReady = false;
    return;
  }

  const container = canvas.parentElement;
  const W = container.clientWidth;
  const H = container.clientHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 1000);
  camera.position.set(0, 0, 2.8);

  const earth = new THREE.Group();
  scene.add(earth);
  const R = 1.0;

  function ll2v(lon, lat, r) {
    const phi   = (90 - lat)  * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
       r * Math.cos(phi),
       r * Math.sin(phi) * Math.sin(theta)
    );
  }

  // Grid lines
  for (let lat = -75; lat <= 75; lat += 15) {
    const pts = [];
    for (let lon = -180; lon <= 180; lon += 2) pts.push(ll2v(lon, lat, R));
    earth.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: lat === 0 ? 0x00ccff : 0x1a5a8a, transparent: true, opacity: lat === 0 ? 0.5 : 0.18 })));
  }
  for (let lon = -180; lon < 180; lon += 15) {
    const pts = [];
    for (let lat = -90; lat <= 90; lat += 2) pts.push(ll2v(lon, lat, R));
    earth.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: 0x1a5a8a, transparent: true, opacity: 0.18 })));
  }

  // Ocean sphere
  earth.add(new THREE.Mesh(new THREE.SphereGeometry(R, 64, 64), new THREE.MeshBasicMaterial({ color: 0x062d5f, transparent: true, opacity: 0.92 })));

  // Atmosphere glow
  [[R+0.04, 0x1a7aff, 0.18], [R+0.10, 0x0055ff, 0.12], [R+0.22, 0x003ab5, 0.07]].forEach(([r, c, o]) => {
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(r, 64, 64), new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: o, side: THREE.BackSide })));
  });

  // Country borders
  try {
    const topo = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());
    const countries = topojson.feature(topo, topo.objects.countries);
    const borderMat = new THREE.LineBasicMaterial({ color: 0x5ec8ff, transparent: true, opacity: 0.75 });
    function addGeoLine(coordinates) {
      if (coordinates.length < 2) return;
      const pts = coordinates.map(([lon, lat]) => ll2v(lon, lat, R + 0.003));
      let segment = [pts[0]];
      for (let i = 1; i < pts.length; i++) {
        if (Math.abs(coordinates[i-1][0] - coordinates[i][0]) > 170) {
          if (segment.length >= 2) earth.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(segment), borderMat));
          segment = [pts[i]];
        } else { segment.push(pts[i]); }
      }
      if (segment.length >= 2) earth.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(segment), borderMat));
    }
    countries.features.forEach(f => {
      const g = f.geometry;
      if (!g) return;
      if (g.type === 'Polygon') g.coordinates.forEach(r => addGeoLine(r));
      else if (g.type === 'MultiPolygon') g.coordinates.forEach(p => p.forEach(r => addGeoLine(r)));
    });
  } catch(e) { console.warn('Globe: failed to load country borders', e); }

  // Logo sprite
  function createLogoSprite() {
    const CW = 512, CH = 150;
    const c = document.createElement('canvas');
    c.width = CW; c.height = CH;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, CW, CH);
    ctx.strokeStyle = 'rgba(100, 175, 240, 0.38)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(30, 33); ctx.lineTo(CW - 30, 33); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(30, CH - 33); ctx.lineTo(CW - 30, CH - 33); ctx.stroke();
    ctx.fillStyle = 'rgba(120, 200, 255, 0.95)'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '600 40px "Syne", sans-serif';
    ctx.fillText('BARNES YACHTING', CW / 2, CH / 2 - 10);
    ctx.fillStyle = 'rgba(100, 175, 240, 0.55)';
    ctx.font = 'italic 400 13px "DM Sans", sans-serif';
    ctx.fillText('Yacht Brokerage & Matchmaker', CW / 2, CH / 2 + 24);
    const tex = new THREE.CanvasTexture(c);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.82, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(1.38, 0.41, 1);
    sprite.position.set(0, 0, 0);
    sprite.renderOrder = 999;
    return sprite;
  }
  try { await document.fonts.load('600 40px "Syne"'); } catch(e) {}
  const logo = createLogoSprite();
  scene.add(logo);

  // Star field
  const sv = [];
  for (let i = 0; i < 1500; i++) {
    const r = 5 + Math.random() * 5, t = Math.random() * Math.PI * 2, p = Math.acos(2 * Math.random() - 1);
    sv.push(r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t));
  }
  const sg = new THREE.BufferGeometry();
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 0.015, transparent: true, opacity: 0.35 })));

  // Prospect dot config
  const tierConfig = {
    hot:  { color: 0xff1111, glow1: 0xff2222, glow2: 0xff0000, coreSize: 0.016, g1Size: 0.035, g2Size: 0.062, g1Opacity: 0.35, g2Opacity: 0.10,
            btnBg: 'rgba(255,40,40,0.18)',  btnBorder: 'rgba(255,50,50,0.6)',   btnColor: '#ff4444', dotBg: '#ff3333', dotShadow: '#ff3333' },
    warm: { color: 0xff8c00, glow1: 0xff9900, glow2: 0xff7700, coreSize: 0.013, g1Size: 0.028, g2Size: 0.050, g1Opacity: 0.28, g2Opacity: 0.08,
            btnBg: 'rgba(255,140,0,0.18)',  btnBorder: 'rgba(255,140,0,0.6)',   btnColor: '#ff9900', dotBg: '#ff8c00', dotShadow: '#ff8c00' },
    cold: { color: 0xffdd00, glow1: 0xffee00, glow2: 0xffcc00, coreSize: 0.010, g1Size: 0.022, g2Size: 0.038, g1Opacity: 0.28, g2Opacity: 0.08,
            btnBg: 'rgba(255,220,0,0.14)',  btnBorder: 'rgba(255,220,0,0.55)',  btnColor: '#ffcc00', dotBg: '#ffdd00', dotShadow: '#ffdd00' },
  };

  const activeState = { hot: true, warm: false, cold: false };
  let tierGroups  = { hot: [], warm: [], cold: [] };
  let glowPulse   = [];
  let pickTargets = [];

  function clearTierDots(tier) {
    tierGroups[tier].forEach(m => { earth.remove(m); if (m.geometry) m.geometry.dispose(); });
    tierGroups[tier] = [];
    glowPulse = glowPulse.filter(g => g.tier !== tier);
    pickTargets = pickTargets.filter(m => (m.userData.tier || '') !== tier);
  }

  function buildTierDots(tier, prospects) {
    clearTierDots(tier);
    const cfg = tierConfig[tier];
    const group = [];
    prospects.forEach((p, i) => {
      const surfPos = ll2v(p.lng, p.lat, R).normalize().multiplyScalar(R + 0.012);
      const spike = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([ll2v(p.lng, p.lat, R).normalize().multiplyScalar(R), ll2v(p.lng, p.lat, R).normalize().multiplyScalar(R + 0.022)]),
        new THREE.LineBasicMaterial({ color: cfg.glow1, transparent: true, opacity: 0.55 })
      );
      spike.userData = { tier }; earth.add(spike); group.push(spike);
      const core = new THREE.Mesh(new THREE.SphereGeometry(cfg.coreSize, 10, 10), new THREE.MeshBasicMaterial({ color: cfg.color }));
      core.position.copy(surfPos); core.userData = { prospect: p, tier };
      earth.add(core); group.push(core); pickTargets.push(core);
      const g1Mat = new THREE.MeshBasicMaterial({ color: cfg.glow1, transparent: true, opacity: cfg.g1Opacity });
      const g1 = new THREE.Mesh(new THREE.SphereGeometry(cfg.g1Size, 10, 10), g1Mat);
      g1.position.copy(surfPos); g1.userData = { tier }; earth.add(g1); group.push(g1);
      glowPulse.push({ mesh: g1, mat: g1Mat, baseOpacity: cfg.g1Opacity, speed: 2.5, phase: i * 1.4, tier });
      const g2Mat = new THREE.MeshBasicMaterial({ color: cfg.glow2, transparent: true, opacity: cfg.g2Opacity });
      const g2 = new THREE.Mesh(new THREE.SphereGeometry(cfg.g2Size, 10, 10), g2Mat);
      g2.position.copy(surfPos); g2.userData = { tier }; earth.add(g2); group.push(g2);
      glowPulse.push({ mesh: g2, mat: g2Mat, baseOpacity: cfg.g2Opacity, speed: 1.8, phase: i * 1.4 + 0.8, tier });
      tierGroups[tier] = group;
    });
  }

  function loadGlobeData(groupedProspects) {
    const tiers = ['hot', 'warm', 'cold'];
    tiers.forEach(tier => {
      const raw = groupedProspects ? (groupedProspects[tier] || []) : [];
      const mapped = mapProspectsForGlobe(raw, tier);
      buildTierDots(tier, mapped);
      const btn = document.getElementById('btn-tier-' + tier);
      if (btn) { const countSpan = btn.querySelector('span:last-child'); if (countSpan) countSpan.textContent = '(' + raw.length + ')'; }
    });
    applyVisibility();
  }

  // Expose updateGlobeDots — accepts flat prospects array
  window.updateGlobeDots = function(flatProspects) {
    loadGlobeData(groupProspectsByTier(flatProspects || []));
  };

  function applyVisibility() {
    Object.keys(tierGroups).forEach(t => tierGroups[t].forEach(m => m.visible = !!activeState[t]));
    pickTargets.forEach(m => { m.visible = !!(activeState[m.userData.tier]); });
  }

  function updateButtonStyle(tier, active) {
    const btn = document.getElementById('btn-tier-' + tier);
    if (!btn) return;
    const cfg = tierConfig[tier];
    const dot = btn.querySelector('.tier-dot');
    if (active) {
      btn.style.background = cfg.btnBg; btn.style.border = '1.5px solid ' + cfg.btnBorder; btn.style.color = cfg.btnColor;
      if (dot) { dot.style.background = cfg.dotBg; dot.style.boxShadow = '0 0 6px ' + cfg.dotShadow; }
    } else {
      btn.style.background = 'rgba(40,40,40,0.3)'; btn.style.border = '1.5px solid rgba(255,255,255,0.1)'; btn.style.color = 'rgba(255,255,255,0.25)';
      if (dot) { dot.style.background = 'rgba(255,255,255,0.15)'; dot.style.boxShadow = 'none'; }
    }
  }
  Object.keys(activeState).forEach(t => updateButtonStyle(t, activeState[t]));
  ['hot', 'warm', 'cold'].forEach(tier => {
    document.getElementById('btn-tier-' + tier)?.addEventListener('click', () => {
      activeState[tier] = !activeState[tier];
      updateButtonStyle(tier, activeState[tier]);
      applyVisibility();
    });
  });

  // Rotation toggle
  let autoRotate = true;
  function updateRotationButton() {
    const btn = document.getElementById('btn-rotation');
    const icon = document.getElementById('btn-rotation-icon');
    const label = document.getElementById('btn-rotation-label');
    if (!btn) return;
    if (autoRotate) {
      btn.style.background = 'rgba(40,120,255,0.15)'; btn.style.border = '1.5px solid rgba(80,160,255,0.45)'; btn.style.color = 'rgba(120,185,255,0.9)';
      icon.textContent = '⏸'; label.textContent = 'STOP';
    } else {
      btn.style.background = 'rgba(40,40,40,0.3)'; btn.style.border = '1.5px solid rgba(255,255,255,0.15)'; btn.style.color = 'rgba(255,255,255,0.35)';
      icon.textContent = '▶'; label.textContent = 'ROTATE';
    }
  }
  updateRotationButton();
  document.getElementById('btn-rotation')?.addEventListener('click', () => { autoRotate = !autoRotate; updateRotationButton(); });

  // Tooltip + raycasting
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const tooltip = document.getElementById('globe-tooltip');
  const tierColors = { hot: 'rgba(255,60,60,0.8)', warm: 'rgba(255,140,0,0.8)', cold: 'rgba(255,220,0,0.8)' };
  let isDragging = false;

  canvas.addEventListener('mousemove', e => {
    if (isDragging) return;
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(pickTargets.filter(m => m.visible));
    if (hits.length > 0) {
      const { prospect: p, tier } = hits[0].object.userData;
      const col = tierColors[tier];
      tooltip.style.border = '1px solid ' + col;
      document.getElementById('tt-name').textContent = p.name;
      document.getElementById('tt-company').textContent = p.company;
      document.getElementById('tt-location').style.color = col;
      document.getElementById('tt-location').textContent = '📍 ' + p.loc;
      document.getElementById('tt-score').style.color = col;
      document.getElementById('tt-score').textContent = (tier==='hot'?'🔥':tier==='warm'?'🟠':'🟡') + ' ' + tier.toUpperCase() + '  ·  Score: ' + p.score;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX - rect.left + 16) + 'px';
      tooltip.style.top  = (e.clientY - rect.top  - 16) + 'px';
      canvas.style.cursor = 'pointer';
    } else {
      tooltip.style.display = 'none';
      canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
    }
  });
  canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

  // Drag to rotate
  let lastMouse = { x: 0, y: 0 };
  canvas.addEventListener('mousedown', e => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; canvas.style.cursor = 'grabbing'; });
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    earth.rotation.y += (e.clientX - lastMouse.x) * 0.006;
    earth.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, earth.rotation.x + (e.clientY - lastMouse.y) * 0.006));
    lastMouse = { x: e.clientX, y: e.clientY };
  });
  window.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'grab'; });
  canvas.style.cursor = 'grab';

  // Animation loop
  let t = 0;
  (function animate() {
    requestAnimationFrame(animate);
    t += 0.016;
    if (autoRotate && !isDragging) earth.rotation.y += 0.0018;
    glowPulse.forEach(({ mesh, mat, baseOpacity, speed, phase, tier }) => {
      if (!activeState[tier]) return;
      const s = Math.sin(t * speed + phase);
      mat.opacity = baseOpacity * (0.5 + 0.5 * s);
      mesh.scale.setScalar(1.0 + 0.5 * (0.5 + 0.5 * s));
    });
    logo.material.opacity = 0.65 + 0.17 * Math.sin(t * 0.8);
    renderer.render(scene, camera);
  })();

  // Responsive resize
  new ResizeObserver(() => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    if (!w || !h) return;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }).observe(container);

  // Load initial data from already-loaded prospects or fetch fresh
  if (_prospects && _prospects.length > 0) {
    loadGlobeData(groupProspectsByTier(_prospects));
  } else {
    try {
      const r = await fetch('/api/prospects');
      const data = await r.json();
      if (data.success && data.prospects) {
        _prospects = data.prospects;
        loadGlobeData(groupProspectsByTier(_prospects));
      }
    } catch(e) {
      console.warn('Globe: failed to load prospect data', e);
      // Fallback demo data
      loadGlobeData({
        hot: [
          { name:'Alexander Rostov', company:'RST Capital Partners', location:'London, UK', heat_score:95 },
          { name:'Carlos Mendes', company:'Mendes Group SA', location:'São Paulo, Brazil', heat_score:88 },
          { name:'Robert Chen', company:'Pacific Ventures Ltd', location:'Hong Kong', heat_score:82 },
        ],
        warm: [
          { name:'Jean-Marc Duval', company:'Duval Holdings SA', location:'Paris, France', heat_score:62 },
          { name:'Nasser Al-Thani', company:'Thani Investment Authority', location:'Doha, Qatar', heat_score:60 },
          { name:'Rajesh Kapoor', company:'Kapoor Industries Ltd', location:'Mumbai, India', heat_score:58 },
        ],
        cold: [
          { name:'Takeshi Yamamoto', company:'Yamamoto Corporation', location:'Tokyo, Japan', heat_score:25 },
          { name:'Hans-Peter Weber', company:'Weber Industries AG', location:'Frankfurt, Germany', heat_score:20 },
        ],
      });
    }
  }
}
// ═══════════════════════════════════════════════════════════════════════════
// END 3D GLOBE

// ═══ INIT ════════════════════════════════════════════════════════════════════
async function init() {
  updateNavTabs();
  await loadStats();
  renderPanel(getPath());

  // Auto-refresh every 30s
  _refreshInterval = setInterval(async () => {
    await loadStats();
    if (_stats) renderTopBar(_stats);
    // Update badge counts
    document.getElementById('nav-hot-badge').textContent = _stats?.hot_prospects || 0;
    document.getElementById('nav-chain-badge').textContent = _stats?.active_chains || 0;
  }, 30000);
}

init();
</script>
